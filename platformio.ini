; Development and CI configuration for the arduino4iot library itself.
; Library users do not need this file - add the library to lib_deps
; of your own project instead (see README.md).

[platformio]
default_envs = native

; Native environment for unit tests (pio test -e native)
[env:native]
platform = native
test_framework = unity
test_build_src = no
lib_deps =
    bblanchon/ArduinoJson@^7.0.0
build_flags =
    -std=gnu++17
    -I include
